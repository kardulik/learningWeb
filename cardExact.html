<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="secondTry.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="page">
        <div class="header">
            <h1 class="header-title">Tvorba karet</h1>
            <button  id="return">Vrátit se</button>
            <button  id="main_page_return">Úvodní strana</button>
        </div>
        <div class="main">

            <div id="pack_naming">
                <h1>Balíček</h1>
                <label for="pack_name">Název skupiny karet</label>
                <input id="pack_name" type="text">

                <button id="pack_name_continue">Nastavit</button>
            </div>

            <div id="card_making">
                <h1 id="card_header">Karty</h1>

                <label for="question">Název nové otázky</label>
                <input id="question" type="text">
                <br>
                <label for="answer">Napište možné odpovědi</label>
                <input id="answer" type="text">

                <br>
                <button id="next" class="redirection">Přidat kartu</button>
                <br>
                <div id="card_display"></div>
                <button id="submit" class="redirection">Konec</button>
            </div>
        </div>
    </div>




    <script src="card_exact.js"></script>
</body>
</html>
